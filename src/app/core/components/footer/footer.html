<footer id="contact" class="py-12 px-6 border-t border-border bg-card">
  <div class="max-w-5xl mx-auto">
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-8 mb-8">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-accent flex items-center justify-center relative">
          <img class="rounded-2xl" [ngSrc]="'assets/Playka_Games.webp'" [alt]="'Playka Games'" fill>
        </div>
        <span class="text-lg font-bold tracking-tight text-foreground">
              Playka Games
            </span>
      </div>

      <div class="flex flex-wrap items-center gap-6 text-sm">
        <a
          href="/logika"
          class="text-muted-foreground hover:text-primary transition-colors font-medium"
        >
        Logika
        </a>
        <a
          href="mailto:support@playkagames.com"
          class="text-muted-foreground hover:text-primary transition-colors font-medium"
        >
        Contact
        </a>
      </div>
    </div>

    <div class="pt-6 border-t border-border flex flex-col md:flex-row items-center justify-between gap-4">
      <p class="text-xs text-muted-foreground">
        © 2026 Playka Games. All rights reserved.
      </p>

      <div class="flex items-center gap-4">
        <a
          href="logika/privacy"
          class="text-xs text-muted-foreground hover:text-foreground transition-colors"
        >
        Logika Privacy
        </a>
        <a
          href="logika/terms"
          class="text-xs text-muted-foreground hover:text-foreground transition-colors"
        >
          Logika Terms
        </a>
      </div>
    </div>
  </div>
</footer>
