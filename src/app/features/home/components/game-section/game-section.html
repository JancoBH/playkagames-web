<section id="games" class="py-16 px-6">
  <div class="max-w-4xl mx-auto">
    <div class="text-center mb-8">
      <span class="inline-block px-3 py-1 text-xs font-bold uppercase tracking-wider text-primary bg-primary/10 rounded-full mb-3">
        Our Games
      </span>
      <h2 class="text-2xl md:text-3xl font-bold text-foreground">
        Play, Think, Enjoy
      </h2>
    </div>

    <div class="grid md:grid-cols-2 gap-5">
      @for (game of games; track game.title) {
        <app-game-card
          [title]="game.title"
          [description]="game.description"
          [features]="game.features"
          [imageSrc]="game.imageSrc"
          [playStoreUrl]="game.playStoreUrl"
          [appStoreUrl]="game.appStoreUrl"
          [iosComingSoon]="game.iosComingSoon"
          [playStoreComingSoon]="game.playStoreComingSoon"
          [learnMoreUrl]="game.learnMoreUrl"
          [accentColor]="game.accentColor"
        />
      }
    </div>
  </div>
</section>
