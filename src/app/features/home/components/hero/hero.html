<section class="min-h-[80vh] flex items-center justify-center px-6 pt-20 relative overflow-hidden">
  <!-- Background decorative elements -->
  <div class="absolute inset-0 -z-10">
    <div class="absolute top-20 left-10 w-72 h-72 bg-primary/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-10 w-96 h-96 bg-accent/15 rounded-full blur-3xl"></div>
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-chart-3/10 rounded-full blur-3xl"
    ></div>
  </div>

  <div class="max-w-4xl mx-auto text-center">
    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-foreground text-balance mb-6">
      Mobile games
      <br />
      <span class="bg-gradient-to-r from-primary via-accent to-chart-3 bg-clip-text text-transparent">
        made with passion
      </span>
    </h1>

    <p class="text-lg md:text-xl text-muted-foreground max-w-2xl mx-auto mb-10 text-pretty">
      We create fun and engaging mobile games. Simple to play, hard to put down.
    </p>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <a
        [routerLink]="['/']"
        fragment="games"
        class="inline-flex items-center justify-center px-8 py-3.5 rounded-full bg-primary text-primary-foreground font-semibold hover:scale-105 transition-transform shadow-lg shadow-primary/30"
      >
        Explore Our Games
      </a>

      <a
        [routerLink]="['/']"
        fragment="about"
        class="inline-flex items-center justify-center px-8 py-3.5 rounded-full border-2 border-accent text-accent font-semibold hover:bg-accent hover:text-accent-foreground transition-colors"
      >
        About Us
      </a>
    </div>
  </div>
</section>
