<section class="py-12 px-6 bg-gradient-to-b from-background to-secondary/30 overflow-hidden">
  <div class="max-w-5xl mx-auto">
    <div class="text-center mb-8">
      <span class="inline-block px-3 py-1 text-xs font-bold uppercase tracking-wider text-accent bg-accent/10 rounded-full mb-3">
        Mini-Games
      </span>
      <h2 class="text-2xl md:text-3xl font-bold text-foreground">
        Dozens of Puzzles to Explore
      </h2>
      <p class="text-muted-foreground mt-2 text-sm">
        Challenge yourself with a variety of brain-teasing games
      </p>
    </div>
  </div>

  <div
    #scrollRef
    class="flex gap-4 overflow-hidden"
    style="scroll-behavior: auto;"
  >
    @for (game of duplicatedGames; track $index) {
      <div class="flex-shrink-0 w-72 md:w-96 group select-none">
        <div class="relative aspect-video rounded-2xl overflow-hidden bg-card border border-border group-hover:border-primary/50 transition-colors">
          <img
            [ngSrc]="game.image || '/placeholder.svg'"
            [alt]="game.name"
            class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
            loading="lazy"
            decoding="async"
            fill/>

          <div class="absolute inset-0 bg-gradient-to-t from-background/90 via-background/20 to-transparent"></div>

          <div class="absolute bottom-0 left-0 right-0 p-3">
            <p class="text-sm font-semibold text-foreground text-center truncate">
              {{ game.name }}
            </p>
          </div>
        </div>
      </div>
    }
  </div>
</section>
